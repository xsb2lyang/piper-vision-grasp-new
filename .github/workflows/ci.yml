name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install -U pip setuptools wheel

      - name: Install vendored SDK
        run: python -m pip install --no-build-isolation -e third_party/pyAgxArm

      - name: Install project
        run: python -m pip install --no-build-isolation -e . pytest

      - name: Smoke imports
        run: python -c "import piper_app, pyAgxArm; print('imports ok')"

      - name: Compile Python sources
        run: python -m compileall src apps scripts tests

      - name: Run lightweight tests
        run: python -m pytest -q tests/test_imports.py
