[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "piper-app"
version = "0.1.0"
description = "Application-layer tooling for Piper robotic arms built on top of vendored pyAgxArm."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "PyYAML>=6.0",
]

[project.scripts]
piper-teleop-gui = "piper_app.cli.teleop_tcp_gui:main"
piper-teleop-keyboard = "piper_app.cli.teleop_tcp_keyboard:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
